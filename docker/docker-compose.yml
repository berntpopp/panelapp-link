name: panelapp-link

services:
  panelapp-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: panelapp-link
    ports:
      - "${PANELAPP_LINK_HOST_PORT:-8000}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      PANELAPP_LINK_HOST: 0.0.0.0
      PANELAPP_LINK_PORT: 8000
      PANELAPP_LINK_TRANSPORT: unified
      PANELAPP_LINK_MCP_PATH: /mcp
      PANELAPP_LINK_LOG_LEVEL: INFO
      PANELAPP_LINK_LOG_FORMAT: json
      # Data lifecycle (see docs/data-lifecycle.md):
      #   - the entrypoint crawls both PanelApp regions and builds the database
      #     ONCE on startup before serving
      #   - the in-app scheduler conditionally refreshes it every 24h
      #     (incremental: only changed/new panels) and hot-reloads on change
      # The named volume below keeps the SQLite database across restarts so a
      # restart re-uses it (the entrypoint refreshes incrementally).
      PANELAPP_LINK_DATA__DATA_DIR: /app/data
      PANELAPP_LINK_DATA__AUTO_BOOTSTRAP: "false"
      PANELAPP_LINK_DATA__REFRESH_ENABLED: "true"
      PANELAPP_LINK_DATA__REFRESH_INTERVAL_HOURS: "24"
    volumes:
      # Persist the built SQLite database across container restarts.
      - panelapp-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # First boot crawls both regions and builds the database in the entrypoint
      # before serving; allow time for the initial crawl + build.
      start_period: 180s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - panelapp-network

volumes:
  panelapp-data:
    driver: local

networks:
  panelapp-network:
    driver: bridge
