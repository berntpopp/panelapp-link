name: panelapp-link

services:
  panelapp-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: panelapp-link
    ports:
      - "${PANELAPP_LINK_HOST_PORT:-8000}:8000"
    env_file:
      - path: ../.env
        required: false
      - path: ../.env.docker
        required: false
    environment:
      PANELAPP_LINK_HOST: 0.0.0.0
      PANELAPP_LINK_PORT: 8000
      PANELAPP_LINK_TRANSPORT: unified
      PANELAPP_LINK_MCP_PATH: /mcp
      PANELAPP_LINK_LOG_LEVEL: INFO
      PANELAPP_LINK_LOG_FORMAT: json
      # Pure live-API client: no database, no ingest, no volume. Queries the
      # PanelApp REST APIs per request with an in-memory cache (6h TTL).
      PANELAPP_LINK_DATA__CACHE_TTL: "21600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Stateless server: ready to serve almost immediately.
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - panelapp-network

networks:
  panelapp-network:
    driver: bridge
